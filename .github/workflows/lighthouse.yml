name: Lighthouse

# Fires when Vercel reports a successful deployment back to GitHub via the
# Deployments API. Works for both PR preview deploys and production deploys.
on:
  deployment_status:

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve target URLs
        id: urls
        run: |
          BASE="${{ github.event.deployment_status.target_url || github.event.deployment_status.environment_url }}"
          echo "Targeting $BASE"
          {
            echo "list<<EOF"
            echo "$BASE"
            echo "$BASE/features"
            echo "$BASE/download"
            echo "$BASE/faq"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ steps.urls.outputs.list }}
          configPath: ./.github/lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
